<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7e7a5"/>
      <stop offset="35%" stop-color="#f2cf6f"/>
      <stop offset="60%" stop-color="#f7e7a5"/>
      <stop offset="100%" stop-color="#e7b84f"/>
    </linearGradient>

    <linearGradient id="goldSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff4c7" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#fff4c7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff4c7" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="liquid" x="-20%" y="-40%" width="140%" height="180%">
      <feTurbulence type="turbulence" baseFrequency="0.01 0.08" numOctaves="2" seed="3" result="noise">
        <animate attributeName="baseFrequency" dur="6s" values="0.01 0.08;0.02 0.06;0.01 0.08" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <path id="ringPath" d="M 400 110 m -70,0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0"/>
  </defs>

  <rect width="800" height="450" fill="#ffffff"/>

  <!-- Focus time band preview -->
  <g transform="translate(0,230)">
    <rect x="120" y="-25" width="560" height="50" rx="25" fill="url(#gold)" filter="url(#liquid)" opacity="0.9"/>
    <rect x="120" y="-25" width="560" height="50" rx="25" fill="url(#goldSoft)" opacity="0.9">
      <animate attributeName="x" dur="7s" values="120;40;120" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="-25" width="560" height="50" rx="25" fill="none" stroke="#f3d27a" stroke-opacity="0.6"/>
  </g>

  <!-- Countdown ring preview -->
  <g transform="translate(0,0)">
    <circle cx="400" cy="110" r="70" fill="none" stroke="url(#gold)" stroke-width="10" filter="url(#glow)"/>
    <circle cx="400" cy="110" r="70" fill="none" stroke="#f7e7a5" stroke-width="2" stroke-opacity="0.4"/>
    <circle r="6" fill="#f7e7a5">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#ringPath"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Labels (optional) -->
  <text x="400" y="190" font-size="14" text-anchor="middle" fill="#999">专注时间段 · 液态流光质感预览</text>
</svg>
